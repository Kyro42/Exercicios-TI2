<html>
<head>
<meta content="text/html; charset = UTF-8" http-equiv="content-type">
<style>
* {
	box-sizing: border-box;
}

body {
	background-color: white;
}

.generaltext, p {
	font-family: Arial;
	text-align: center;
}

.section--container__responsive {
	display: flex;
	flex-direction: row;
	justify-content: center;
	align-items: center;
	border-bottom: dashed;
	border-color: gray;
}

.input--down {
	display: block;
	margin: 0px auto;
	margin-bottom: 10px;
}

.input--main__style {
	background-color: #00FF00;
}

.input--remove__style {
	background-color: red;
}

.input--consult__style {
	background-color: darkblue;
}

.input--button {
	font-weight: bold;
	font-family: Arial;
	font-size: medium;
	border-color: transparent;
	display: block;
	margin: 0px auto;
	margin-bottom: 10px;
	color: white;
}

.input--register {
	display: inline;
}

.input--radio {
	display: inline;
}

input {
	display: block;
	border-radius: 7px;
	padding: 10px;
	border-style: solid;
	border-color: lightgray;
	color: black;
	padding: 10px;
	margin-bottom: 10px;
}

.p--radio__display {
	display: block;
}

form p {
	text-align: initial;
	display: inline;
	margin-left: 15px;
}

.p--nomargin {
	margin-left: 0px;
	margin-right: 10px;
}
</style>
<title>Controle de Carros</title>
</head>

<body>

	<h1>Controle de Carros</h1>
	<section class="section--container__responsive">
		<section class="section--mainrow__responsive first--section">
			<h1 class="generaltext">Inserir carro</h1>
			<form class="form--register" action="http://localhost:6789/carros/insert" method="post" id="form-add">
				<p>Nome:</p>          
				<input class="input--register" type="text" name="nome" value="" placeholder="eclipse, savana...">
				<p>Marca:</p>              
				<input class="input--register" type="text" name="marca" value="" placeholder="mitsubishi, BYD...">
				<p>Valor:</p>
				<input class="input--register" type="text" name="valor" value="">
				
				<p>Eletrico:</p>
				<input class="input--register" type="text" name="eletrico" value="" placeholder="true"> 
				
				<input type="submit" value="cadastrar" class="input--main__style input--button">
			</form>
		</section>
	</section>
	<section class="section--container__responsive">
		<section class="section--row__responsive">
			<h1 class="generaltext">Detalhar carro</h1>
			<form onsubmit="addIdToPath('form-get', 'http://localhost:6789/carros/')" method="get" id="form-get">
				<input class="input--down" type="text" id="id" value="" placeholder="id do carro..."> 
				<input type="submit" value="consultar" class="input--button input--consult__style">
			</form>
		</section>
		
		&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;
		
		<section class="section--row__responsive">
			<h1 class="generaltext">Remover carro</h1>
			<form onsubmit="addIdToPath('form-delete', 'http://localhost:6789/carros/delete/')" method="get" id="form-delete">
				<input class="input--down" type="text" id="id" value="" placeholder="id do carro...">
				<input type="submit" value="remover" class="input--remove__style input--button">
			</form>
		</section>
		
		&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;

		<section class="section--row__responsive">
			<h1 class="generaltext">Listar carro</h1>
			<form action="http://localhost:6789/carros/list/1"  method="get" id="form-all">
			    <br><br><br>
				<input type="submit" value="todos" class="input--consult__style input--button">
			</form>
		</section>
	</section>

	<section class="section--container__responsive" style="visibility: hidden" id="product-result">
		<table border="1">
			<tr>
				<td>Carros id:</td>
				<td><span id="id">Sem Resultado</span></td>
			</tr>
			<tr>
				<td>Nome:</td>
				<td><span id="nome">Sem Resultado</span></td>
			</tr>
			<tr>
				<td>Marca:</td>
				<td><span id="marca">Sem Resultado</span></td>
			</tr>
			<tr>
				<td>valor:</td>
				<td><span id="valor">Sem Resultado</span></td>
			</tr>
			<tr>
				<td>Eletrico:</td>
				<td><span id="eletrico">Sem Resultado</span></td>
			</tr>
		</table>
	</section>
	<UM-CARRO>
	<LISTAR-CARROS>
<script type="text/javascript">

function addIdToPath(form_name, base_url){
    var your_form = document.getElementById(form_name);
	var id = your_form.elements.namedItem("id").value;
	action_src = base_url + id;
	your_form.action = action_src;
}
function confirmarDeleteCarro(id, nome, marca, valor, eletrico) {  
	
    if (confirm('Confirmar a exclusão do carro [' + nome + '] (ID ' + id + ') com valor R$ ' + valor)) {  
        location.href = '/carros/delete/' + id;
    }
}
function onLoad() {
    if(document.getElementById("msg").value != ""){
      alert(document.getElementById("msg").value);
    }
}

</script>
</body>
</html>
